name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 22.13.x
      PNPM_VERSION: 11.0.9
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (cold)
        run: |
          pnpm --filter @maps-viewer/shared build
          pnpm --filter @maps-viewer/core build
          pnpm build

      - name: Package VSIX
        working-directory: packages/vscode
        run: pnpm package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error
