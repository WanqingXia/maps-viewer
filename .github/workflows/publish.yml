name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NODE_VERSION: 22.13.x
      PNPM_VERSION: 11.0.9
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build everything
        run: |
          pnpm --filter @maps-viewer/shared build
          pnpm --filter @maps-viewer/core build
          pnpm build

      - name: Package VSIX
        working-directory: packages/vscode
        run: pnpm package

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: packages/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-dependencies --packagePath maps-viewer-*.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        working-directory: packages/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish maps-viewer-*.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/*.vsix
          generate_release_notes: true
