<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background tile -->
  <rect width="256" height="256" rx="48" fill="#1f1f23"/>

  <!-- Faint map grid -->
  <g stroke="#3a3a42" stroke-width="1.2" opacity="0.7">
    <line x1="32"  y1="32"  x2="32"  y2="224"/>
    <line x1="96"  y1="32"  x2="96"  y2="224"/>
    <line x1="160" y1="32"  x2="160" y2="224"/>
    <line x1="224" y1="32"  x2="224" y2="224"/>
    <line x1="32"  y1="64"  x2="224" y2="64"/>
    <line x1="32"  y1="128" x2="224" y2="128"/>
    <line x1="32"  y1="192" x2="224" y2="192"/>
  </g>

  <!-- Map pin -->
  <g transform="translate(128 128)">
    <!-- Soft shadow -->
    <ellipse cx="0" cy="80" rx="28" ry="6" fill="#000" opacity="0.35"/>
    <!-- Pin teardrop -->
    <path d="
      M 0 -74
      C  44 -74  64 -38  64 -8
      C  64  30   8  68  0  82
      C  -8 68 -64 30 -64 -8
      C -64 -38 -44 -74  0 -74 Z"
      fill="#e6194b"/>
    <!-- Pin inner dot -->
    <circle cx="0" cy="-8" r="22" fill="#ffffff"/>
    <circle cx="0" cy="-8" r="10" fill="#e6194b"/>
  </g>
</svg>
